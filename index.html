<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Lua Obfuscator | Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #0ea5e9; 
            --bg: #020617; 
            --card: rgba(15, 23, 42, 0.85); 
            --border: rgba(30, 41, 59, 0.8); 
            --glow: rgba(14, 165, 233, 0.3);
        }
        
        /* Temas */
        .theme-purple { --primary: #a855f7; --glow: rgba(168, 85, 247, 0.3); }
        .theme-green { --primary: #22c55e; --glow: rgba(34, 197, 94, 0.3); }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s, border-color 0.3s; }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-circle {
            width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
            box-shadow: 0 0 15px var(--glow);
        }
        .loader-text { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; animation: pulse 1.5s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .hidden { opacity: 0; visibility: hidden; }

        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* Estilo do Toggle de Temas */
        .theme-switcher {
            z-index: 10; margin-bottom: 15px; display: flex; gap: 10px;
            background: var(--card); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--border);
        }
        .theme-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .theme-dot:hover { transform: scale(1.2); }
        .dot-blue { background: #0ea5e9; }
        .dot-purple { background: #a855f7; }
        .dot-green { background: #22c55e; }

        .container { 
            width: 100%; max-width: 800px; background: var(--card); padding: 25px; border-radius: 30px; 
            border: 1px solid var(--border); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); z-index: 2;
        }

        header { text-align: center; margin-bottom: 20px; }
        h2 { font-weight: 800; font-size: 26px; color: var(--primary); text-shadow: 0 0 10px var(--glow); }

        .label { font-size: 10px; color: #94a3b8; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; display: block; margin-top: 10px; }
        
        textarea { 
            width: 100%; height: 160px; background: rgba(0, 0, 0, 0.5); color: var(--primary); 
            border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: 'JetBrains Mono', monospace; 
            font-size: 13px; resize: none; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--glow); }

        .button-group { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 15px 0; }
        @media (min-width: 600px) { .button-group { grid-template-columns: 2fr 1fr 1fr; } }

        .btn { 
            position: relative; overflow: hidden; padding: 14px; border: none; border-radius: 12px; 
            font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 8px; font-size: 13px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 4px 10px var(--glow); }
        .btn-sec { background: #1e293b; color: #fff; border: 1px solid var(--border); }

        .ripple { position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 50%; transform: scale(0); animation: ripple-animation 0.6s linear; pointer-events: none; }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        .log { font-size: 11px; color: var(--primary); background: #000; padding: 12px; border-radius: 8px; border-left: 3px solid var(--primary); font-family: monospace; }
    </style>
</head>
<body id="main-body">

<div id="loader">
    <div class="loader-circle"></div>
    <div class="loader-text">Starting Saturn Nexus...</div>
</div>

<div class="theme-switcher">
    <span style="font-size: 10px; color: #94a3b8; font-weight: bold; margin-right: 5px; text-transform: uppercase;">Themes:</span>
    <div class="theme-dot dot-blue" onclick="changeTheme('blue')"></div>
    <div class="theme-dot dot-purple" onclick="changeTheme('purple')"></div>
    <div class="theme-dot dot-green" onclick="changeTheme('green')"></div>
</div>

<canvas id="particles-canvas"></canvas>

<div class="container">
    <header>
        <h2>Saturn Lua Obfuscator<span style="color:#fff"> - v4.0</span></h2>
        <p style="color: #64748b; font-size: 12px;">v34 Engine + Smart Minify</p>
    </header>
    
    <span class="label">Input Script</span>
    <textarea id="input" placeholder="-- Ex: print('Sarturn Lua Obfuscator')..."></textarea>
    
    <span class="label">Protected Code</span>
    <textarea id="output" readonly placeholder="The result will appear here..."></textarea>
    
    <div class="button-group">
        <button class="btn btn-main" onclick="obfuscate(event)"><i class="fas fa-bolt"></i> Obfuscate With Nexus v4.0</button>
        <button class="btn btn-sec" onclick="copyCode(event)"><i class="fas fa-copy"></i> Copy</button>
        <button class="btn btn-sec" onclick="newScript(event)"><i class="fas fa-trash"></i> New script</button>
    </div>
    
    <div class="log" id="status"><span>👋 Welcome to Saturn Nexus V4 by SaturnStudio </span></div>
</div>

<script>
    function changeTheme(color) {
    const body = document.body; // Seleciona o corpo da página
    
    // Remove os temas anteriores
    body.classList.remove('theme-purple', 'theme-green');
    
    // Aplica o novo tema se não for o azul (que é o padrão)
    if (color === 'purple') body.classList.add('theme-purple');
    if (color === 'green') body.classList.add('theme-green');
    
    // --- O SEGREDO ESTÁ AQUI ---
    // Guarda o nome do tema no "disco" do navegador
    localStorage.setItem('saturn-theme', color);
    
    setStatus("👋 Welcome to Saturn Nexus V4 by SaturnStudio");
}


    // --- RIPPLE EFFECT ---
    function createRipple(event) {
        const button = event.currentTarget;
        const circle = document.createElement("span");
        const diameter = Math.max(button.clientWidth, button.clientHeight);
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - button.offsetLeft - (diameter/2)}px`;
        circle.style.top = `${event.clientY - button.offsetTop - (diameter/2)}px`;
        circle.classList.add("ripple");
        button.appendChild(circle);
        setTimeout(() => circle.remove(), 600);
    }

    window.addEventListener('load', () => { setTimeout(() => { document.getElementById('loader').classList.add('hidden'); }, 1500); });
// Função para carregar o tema salvo assim que a página abre
function loadSavedTheme() {
    const savedTheme = localStorage.getItem('saturn-theme');
    if (savedTheme) {
        changeTheme(savedTheme);
    }
}

// Executa a verificação de tema mal o script carrega
loadSavedTheme();

    // --- PARTÍCULAS ---
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2 + 1; this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2; }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.x > canvas.width) this.x = 0; if (this.y > canvas.height) this.y = 0; }
        draw() { 
            let pColor = getComputedStyle(document.documentElement).getPropertyValue('--primary');
            ctx.fillStyle = pColor + "44"; // Adiciona transparência
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); 
        }
    }
    function init() { particles = []; for (let i = 0; i < 40; i++) particles.push(new Particle()); }
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    init(); animate();

    // --- LÓGICA DO SITE ---
    function setStatus(t) { document.getElementById('status').querySelector('span').innerText = t; }

    function luaMinify(code) { return code.replace(/--\[\[[\s\S]*?\]\]/g, '').replace(/--.*$/gm, '').replace(/\s+/g, ' ').trim(); }

    function copyCode(e) {
        createRipple(e);
        const out = document.getElementById('output');
        if(!out.value) return;
        out.select(); document.execCommand('copy');
        setStatus("Copied to clipboard!");
    }

    function newScript(e) {
        createRipple(e);
        document.getElementById('input').value = ""; document.getElementById('output').value = "";
        setStatus("Ready for new mission.");
    }

    function obfuscate(e) {
        createRipple(e);
        const inputRaw = document.getElementById('input').value;
        const output = document.getElementById('output');
        if (!inputRaw.trim()) return setStatus("Please enter a code!");

        setStatus("Applying v34 Protection...");
        const input = luaMinify(inputRaw);
        const salt = Math.floor(Math.random() * 100) + 50;
        const randVar = (n) => "_" + n + Math.random().toString(36).substring(7);
        const v_t = randVar("S"), v_v = randVar("VM");

        const toHex = (str, k) => str.split('').map(c => '"\\x' + (c.charCodeAt(0) ^ k).toString(16).padStart(2, '0') + '"').join(',');

        const code = `--[[ This script is protected using Saturn Lua obfuscator v4.0 ]] local k=${salt} local ${v_t}={${toHex(input, salt)}} local function ${v_v}(t,k) local r="" local sb,sc,bx=string.byte,string.char,bit32.bxor for i=1,#t do r=r..sc(bx(sb(t[i],1),k)) end return r end loadstring(${v_v}(${v_t},k))()`;

        setTimeout(() => { output.value = code; setStatus("Script Protected Successfully!"); }, 600);
    }
</script>
</body>
</html>
